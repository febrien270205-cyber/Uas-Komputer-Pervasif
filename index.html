<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Exam System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Pustaka untuk Fitur Screenshot Hasil Ujian -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- POP-UP WARNING (PERSONA CUT-IN STYLE) -->
    <div id="warningPopup">
        <div class="warning-content">⚠️ ALERT! TAB OUT DETECTED! ⚠️</div>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="loginPage">
        <div class="login-box">
            <div class="login-inner-form">
                <h1>SMART EXAM Anti Cheat</h1>
                <p>LOGIN KAN </p>
                
                <input type="text" id="nama" placeholder="MASUKKAN NAMA...">
                <input type="text" id="nim" placeholder="MASUKKAN NIM...">
                <input type="password" id="password" placeholder="MASUKKAN PASSWORD...">
                
                <button id="loginBtn">LOGIN</button>
                <div id="loginError"></div>
            </div>
        </div>
    </div>

    <!-- HALAMAN UJIAN -->
    <div id="examPage" style="display: none;">
        <div class="timerBox">
            <div class="timer-inner">
                <div>
                    <h2 style="font-style: italic; font-weight: 800; text-transform: uppercase;">Anti Cheat Exam</h2>
                    <p style="color: #64d1ff; font-weight: 600;">Peserta: <span id="showNama" style="color: #fff;">-</span> (<span id="showNim" style="color: #fff;">-</span>)</p>
                    <p style="color: #64d1ff; font-weight: 600; margin-top: 5px;">Status: <span id="afkStatus" style="color: #fffbd5;">Aktif</span> | Peringatan: <span id="warningCount" style="color: #ff0055;">0</span>/3</p>
                </div>
                <div id="timer">30:00</div>
            </div>
            <div class="progress">
                <div id="progressBar"></div>
            </div>
        </div>

        <!-- Wadah Soal-Soal -->
        <div id="questionContainer"></div>

        <!-- Tombol Selesai -->
        <button id="finishBtn">FINISH EXAM</button>
    </div>

    <!-- HALAMAN HASIL UJIAN -->
    <div id="resultPage" style="display: none; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px;">
        <div class="card resultCard" style="width: 100%; max-width: 500px; text-align: center; border: 4px solid #fff; box-shadow: 10px 10px 0 #fff500;">
            <h2 style="font-family: 'Impact', sans-serif; font-size: 32px; font-style: italic; color: #fffbd5; margin-bottom: 20px;">EXAM CLEAR</h2>
            <p style="font-size: 18px; margin-bottom: 10px;">Nama: <span id="resultNama" style="font-weight: 800; color: #00f0ff;">-</span></p>
            <p style="font-size: 18px; margin-bottom: 10px;">NIM: <span id="resultNim" style="font-weight: 800; color: #00f0ff;">-</span></p>
            <p style="font-size: 16px; color: #9ca3af; margin-bottom: 5px;">Tanggal: <span id="tanggal">-</span></p>
            <p style="font-size: 16px; color: #9ca3af; margin-bottom: 25px;">Waktu Selesai: <span id="jam">-</span></p>
            
            <div style="background: #fff; color: #000; padding: 15px; font-family: 'Impact', sans-serif; font-size: 40px; font-style: italic; display: inline-block; width: 100%; max-width: 200px; margin-bottom: 25px; box-shadow: 5px 5px 0 #00f0ff;">
                SCORE: <span id="score">0</span>
            </div>

            <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-bottom: 20px;">
                <p style="font-weight: 800; border-bottom: 1px solid #fff; padding-bottom: 5px; margin-bottom: 10px; font-size: 14px; color: #64d1ff;">ACTIVITY LOGS:</p>
                <ul id="activityLog" style="list-style: none; font-size: 12px; font-family: monospace; line-height: 1.6;"></ul>
            </div>
        </div>

        <div class="resultButton" style="display: flex; gap: 20px; margin-top: 20px; transform: skewX(-6deg);">
            <button id="downloadImage" style="background: #00f0ff; color: #000; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; font-style: italic;">SAVE RESULT (PNG)</button>
            <button id="downloadLog" style="background: #fff; color: #000; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; font-style: italic;">DOWNLOAD LOG (TXT)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
